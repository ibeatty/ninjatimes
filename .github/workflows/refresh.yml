name: Refresh run orders

# Scrapes the WNL run orders and deploys the static site to GitHub Pages.
# Runs on a schedule during the event, on demand, and on relevant pushes.

on:
  schedule:
    # GitHub throttles high-frequency schedules hard — in practice this */10 only
    # fires every 1-2 hours. It's kept as a *safety net* that restarts the
    # self-chain (see the "Re-arm" step) if a run ever dies without re-triggering.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}        # the manual "Run workflow" button = force a refresh
  push:
    branches: [main]
    paths:
      - 'scraper/**'
      - 'site/**'
      - 'config/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/refresh.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # After the championships end (config event_end_date), scheduled runs no-op
      # so we stop hitting the WNL/timing site. Manual "Run workflow" always runs.
      - name: Check event window
        id: window
        run: |
          END=$(python3 -c "import json;print(json.load(open('config/settings.json')).get('event_end_date',''))")
          TODAY=$(date -u +%F)
          if [ -n "$END" ] && [[ "$TODAY" > "$END" ]] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Past event end ($END); skipping scheduled run."
            echo "active=false" >> "$GITHUB_OUTPUT"
          else
            echo "active=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up uv
        if: steps.window.outputs.active == 'true'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Scrape run orders -> site/data/
        if: steps.window.outputs.active == 'true'
        run: uv run python scraper/scrape.py -v

      - name: Upload Pages artifact
        if: steps.window.outputs.active == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        if: steps.window.outputs.active == 'true'
        uses: actions/deploy-pages@v4

      # Self-chain: keep ~10-minute freshness without relying on GitHub's throttled
      # scheduler. After deploying, wait ~9 min and trigger the next run ourselves.
      # The built-in GITHUB_TOKEN can't do this (GitHub blocks self-dispatch to
      # prevent loops), so it uses an optional REFRESH_PAT secret. If that secret
      # isn't set, this no-ops and we simply fall back to the scheduled cron — so
      # this change is safe to ship before the token exists. always() keeps the
      # chain alive even if a transient deploy hiccup failed one run.
      - name: Re-arm next refresh (~10 min)
        if: always() && steps.window.outputs.active == 'true'
        env:
          REFRESH_PAT: ${{ secrets.REFRESH_PAT }}
        run: |
          if [ -z "$REFRESH_PAT" ]; then
            echo "REFRESH_PAT not set — skipping self-chain; relying on the scheduled cron."
            exit 0
          fi
          echo "Waiting ~9 min before triggering the next refresh…"
          sleep 540
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $REFRESH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/refresh.yml/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}')
          if [ "$code" = "204" ]; then
            echo "Next refresh dispatched."
          else
            echo "Dispatch failed (HTTP $code) — the scheduled cron will restart the chain."
          fi
